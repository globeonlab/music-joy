<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlobeOn Lab Login</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            /* الأنيميشن تم تعديله ليكون واضح جداً ومشرق */
            background: linear-gradient(-45deg, #ff1744, #4a148c, #311b92, #1a0b2e);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .interface-container {
            width: 90vw;
            max-width: 360px;
            aspect-ratio: 9 / 16;
            /* الكود بينادي على الصورة دي، لازم يكون اسمها كده بالظبط في جيت هاب */
            background: url('bg_clean.png') no-repeat center center;
            background-size: contain;
            position: relative;
            z-index: 10;
            /* ضفت حدود خفيفة جداً عشان لو الصورة اتأخرت في التحميل تعرف إن المربع موجود */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        #passwordInput {
            position: absolute;
            top: 60.5%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            padding: 10px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05); /* شفافية خفيفة جداً لتمييز المكان */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        #passwordInput::placeholder { color: rgba(255,255,255,0.7); }

        .login-btn {
            position: absolute;
            top: 71.5%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 45px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="interface-container" id="lock-screen">
        <input type="password" id="passwordInput" placeholder="Enter passcode">
        <button class="login-btn" onclick="checkPass()">Log In</button>
    </div>

    <script>
        function checkPass() {
            const pass = document.getElementById('passwordInput').value;
            if(pass === "1234") {
                alert("Welcome to GlobeOn Lab");
            } else {
                alert("Wrong Code");
            }
        }
    </script>
</body>
</html>
