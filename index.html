<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Joy 🎵</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 25px; text-align: center; width: 85%; max-width: 380px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 1px solid #333; }
        h2 { color: #1DB954; margin-bottom: 20px; font-size: 1.8rem; }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: none; text-align: center; font-size: 1.1rem; background: #282828; color: white; outline: none; }
        button.login-btn { background: #1DB954; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; transition: 0.3s; }
        #player-ui { display: none; }
        .track-box { background: #282828; margin: 15px 0; padding: 18px; border-radius: 15px; cursor: pointer; transition: 0.3s; border: 1px solid #333; text-align: right; display: flex; align-items: center; }
        .track-box:hover { background: #333; border-color: #1DB954; }
        .icon { font-size: 1.5rem; margin-left: 15px; }
        .track-info { display: flex; flex-direction: column; }
        .track-name { font-weight: bold; font-size: 1rem; color: #fff; }
        .artist { font-size: 0.85rem; color: #b3b3b3; margin-top: 4px; }
        audio { width: 100%; margin-top: 25px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        #now-playing { color: #1DB954; font-size: 0.9rem; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card" id="lock-screen">
        <h2>Music Joy</h2>
        <input type="password" id="passwordInput" placeholder="أدخل كلمة السر">
        <button class="login-btn" onclick="checkPass()">دخول</button>
    </div>

    <div class="card" id="player-ui">
        <h2>قائمة الأغاني</h2>
        <div id="now-playing">اختر أغنية للاستماع</div>
        
        <div class="track-box" onclick="playMusic('andra.mp3', 'Rise Up', 'Andra Day')">
            <span class="icon">🎵</span>
            <div class="track-info">
                <span class="track-name">Rise Up</span>
                <span class="artist">Andra Day</span>
            </div>
        </div>

        <div class="track-box" onclick="playMusic('kiana.mp3', 'Come And See Me', 'Kiana Ledé')">
            <span class="icon">🎧</span>
            <div class="track-info">
                <span class="track-name">Come And See Me</span>
                <span class="artist">Kiana Ledé</span>
            </div>
        </div>

        <audio id="main-player" controls></audio>
        <p style="font-size: 0.7rem; color: #555; margin-top: 20px;">تم الوصول عبر تقنية NFC بنجاح ✅</p>
    </div>

    <script>
        // دالة التحقق من كلمة السر
        function checkPass() {
            if(document.getElementById('passwordInput').value === "1234") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('player-ui').style.display = 'block';
            } else {
                alert("كلمة السر غير صحيحة!");
            }
        }

        // دالة تشغيل الأغاني من جيت هاب مباشرة
        function playMusic(fileName, title, artist) {
            const player = document.getElementById('main-player');
            const status = document.getElementById('now-playing');
            
            player.src = fileName; 
            status.innerText = "تشغيل: " + title + " - " + artist;
            player.play();
        }
    </script>
</body>
</html>
