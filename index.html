<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlobeOn Lab Login</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; background-color: #121212; 
            display: flex; justify-content: center; align-items: center; height: 100vh; 
        }

        /* حاوية التصميم - تعتمد على صورتك كخلفية */
        .design-container {
            width: 380px; height: 680px; /* مقاسات قريبة من تصاميم الموبايل */
            background: url('bg_clean.png') no-repeat center center;
            background-size: contain;
            position: relative; /* لضبط أماكن العناصر فوقها */
        }

        /* حقل إدخال الباسورد - مضبوط فوق القفل تماماً */
        #passwordInput {
            position: absolute;
            top: 410px; /* المكان الدقيق من الصورة الدليل */
            left: 50px; width: 280px; padding: 10px;
            background: transparent; border: none; color: #fff;
            text-align: center; font-size: 1rem; outline: none;
        }
        #passwordInput::placeholder { color: rgba(255,255,255,0.7); }

        /* زر تسجيل الدخول - مضبوط فوق الزر الملون تماماً */
        .login-btn {
            position: absolute;
            top: 485px; /* المكان الدقيق من الصورة الدليل */
            left: 50px; width: 280px; height: 45px;
            background: transparent; border: none; cursor: pointer;
            color: #fff; font-weight: bold; font-size: 1.2rem;
        }
        
        #player-ui { display: none; text-align: center; color: #fff; }
    </style>
</head>
<body>

    <div class="design-container" id="lock-screen">
        <input type="password" id="passwordInput" placeholder="Enter password">
        <button class="login-btn" onclick="checkPass()">Log In</button>
    </div>

    <div id="player-ui">
        </div>

    <script>
        // الكود المعتاد للتحقق من الباسورد
        function checkPass() {
            if(document.getElementById('passwordInput').value === "1234") {
                alert("Welcome to GlobeOn Lab");
            } else { alert("Wrong Password"); }
        }
    </script>
</body>
</html>
