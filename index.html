<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GlobeOn Lab Music 🎵</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a0b2e">
    <link rel="icon" href="logo.png" type="image/png">

    <style>
        :root { 
            --primary: #bb86fc; 
            --glass-bg: rgba(255, 255, 255, 0.04); 
            --text-white: #ffffff;
        }

        /* تهيئة الصفحة لمنع التمرير وضمان التمركز */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* الخلفية الملونة المتحركة (صورتك bg.jpg) */
        .bg-container {
            position: fixed;
            top: -10%; left: -10%; 
            width: 120%; height: 120%;
            z-index: -1;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            /* أنيميشن زووم وحركة خفيفة لإعطاء حياة للألوان */
            animation: backgroundFlow 30s ease-in-out infinite alternate;
            filter: brightness(0.7) contrast(1.1);
        }

        @keyframes backgroundFlow {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.15) translate(-2%, -3%); }
        }

        /* الكارت الزجاجي الاحترافي */
        .glass-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 40px;
            padding: 3rem;
            width: 88vw;
            max-width: 380px;
            max-height: 85vh;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        /* اللوجو الشفاف - PNG */
        .logo-img { 
            width: 100px; 
            margin-bottom: 2rem; 
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.25));
        }

        /* العناوين والنصوص بيضاء تماماً وواضحة */
        h2 { 
            color: var(--text-white); 
            font-weight: 200; 
            margin-bottom: 2rem; 
            font-size: 1.7rem; 
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        h2 span { font-weight: 800; }

        input { 
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            background: rgba(255, 255, 255, 0.08); 
            color: var(--text-white); 
            text-align: center; font-size: 1.1rem; 
            outline: none; box-sizing: border-box;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.5); }

        .login-btn { 
            background: var(--text-white); 
            color: #1a0b2e; 
            border: none; 
            padding: 15px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 1.2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }
        .login-btn:active { transform: scale(0.96); }

        /* دعم الـ Landscape */
        @media (orientation: landscape) and (max-height: 500px) {
            .glass-card {
                flex-direction: row;
                max-width: 85%;
                padding: 1.5rem;
                gap: 30px;
            }
            .logo-img { width: 70px !important; margin: 0 !important; }
            h2 { font-size: 1.4rem; margin-bottom: 1rem !important; }
        }

        #player-ui { display: none; }
        .track-box { 
            background: rgba(255,255,255,0.06); margin: 10px 0; padding: 15px; 
            border-radius: 20px; cursor: pointer; display: flex; align-items: center; width: 100%;
            box-sizing: border-box;
        }
        .track-info { text-align: right; margin-right: 15px; flex-grow: 1; color: #fff; }
        canvas { width: 100%; height: 60px; margin-top: 10px; }
        audio { width: 100%; margin-top: 15px; filter: invert(1); opacity: 0.5; }
    </style>
</head>
<body>

    <div class="bg-container"></div>

    <div class="glass-card" id="lock-screen">
        <img src="logo.png" alt="GlobeOn" class="logo-img">
        <div>
            <h2>GLOBEON <span>LAB</span></h2>
            <input type="password" id="passwordInput" placeholder="Passcode">
            <button class="login-btn" onclick="checkPass()">ENTER</button>
        </div>
    </div>

    <div class="glass-card" id="player-ui">
        <div id="status-text" style="color: var(--primary); font-size: 0.8rem; margin-bottom: 10px;">Ready to Play</div>
        <div class="track-box" onclick="playMusic('andra.mp3', 'Rise Up', 'Andra Day')">
            <div style="font-size: 1.4rem;">🎵</div>
            <div class="track-info"><strong>Rise Up</strong><br><small>Andra Day</small></div>
        </div>
        <canvas id="canvas"></canvas>
        <audio id="main-player" controls></audio>
    </div>

    <script>
        let audioCtx, source, analyser, canvas, ctx, bufferLength, dataArray;

        function checkPass() {
            if(document.getElementById('passwordInput').value === "1234") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('player-ui').style.display = 'block';
                canvas = document.getElementById("canvas");
                ctx = canvas.getContext("2d");
            } else { alert("Wrong Passcode"); }
        }

        async function playMusic(file, title, artist) {
            const player = document.getElementById('main-player');
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(player);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                draw();
            }
            if (audioCtx.state === 'suspended') { await audioCtx.resume(); }
            player.src = file;
            player.play();
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title, artist: artist,
                    artwork: [{ src: 'logo.png', sizes: '512x512', type: 'image/png' }]
                });
            }
        }

        function draw() {
            requestAnimationFrame(draw);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let x = 0;
            for(let i = 0; i < dataArray.length; i++) {
                let barHeight = dataArray[i] / 2;
                ctx.fillStyle = `rgba(187, 134, 252, 0.8)`;
                ctx.fillRect(x, canvas.height - barHeight, 3, barHeight);
                x += 7;
            }
        }
    </script>
</body>
</html>
