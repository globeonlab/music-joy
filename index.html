<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GlobeOn Lab Music 🎵</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a0b2e">
    <link rel="icon" href="logo.png" type="image/png">

    <style>
        :root { 
            --primary: #bb86fc; 
            --glass: rgba(255, 255, 255, 0.08);
            --bg-dark: #121212;
        }

        /* منع التمرير الزائد وضمان التمركز المطلق */
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg-dark);
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            -webkit-font-smoothing: antialiased;
        }

        /* خلفية متحركة بلمسة أنيميشن و Blur من تصميمك */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 30% 30%, #4a148c, #1a0b2e);
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 350px; height: 350px;
            background: var(--primary);
            filter: blur(90px);
            border-radius: 50%;
            opacity: 0.15;
            animation: moveBlob 25s infinite alternate;
        }

        @keyframes moveBlob {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(120%, 90%) scale(1.6); }
        }

        /* الكارت الزجاجي الاحترافي - نسخة طبق الأصل من تصميمك */
        .glass-card { 
            background: var(--glass);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            padding: 2.5rem;
            width: 88vw;
            max-width: 370px;
            max-height: 85vh; /* يمنع الخروج عن الشاشة في الـ Landscape */
            text-align: center;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.55);
            z-index: 10;
            overflow-y: auto; /* يسمح بالتمرير داخل الكارت فقط */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* تعديلات الـ Landscape */
        @media (orientation: landscape) and (max-height: 500px) {
            .glass-card {
                flex-direction: row;
                max-width: 85%;
                max-height: 80vh;
                padding: 1.5rem;
                gap: 25px;
            }
            .logo-img { width: 70px !important; margin: 0 !important; }
            h2 { font-size: 1.3rem; margin: 0 !important; }
            #status-text { display: none; }
        }

        .logo-img { width: 90px; margin-bottom: 2rem; filter: drop-shadow(0 0 10px rgba(187, 134, 252, 0.4)); }
        h2 { color: #fff; font-weight: 200; margin-bottom: 2rem; font-size: 1.6rem; letter-spacing: 1px; }
        h2 span { font-weight: 800; color: var(--primary); }

        input { 
            width: 100%; padding: 14px; margin-bottom: 18px; border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255,255,255,0.06); color: white; 
            text-align: center; font-size: 1rem; box-sizing: border-box; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); }

        .login-btn { 
            background: var(--primary); color: #1a0b2e; border: none; 
            padding: 14px; border-radius: 50px; cursor: pointer; 
            font-weight: bold; width: 100%; font-size: 1.2rem; transition: 0.2s;
            box-shadow: 0 10px 25px rgba(187, 134, 252, 0.35);
        }
        .login-btn:active { transform: scale(0.98); opacity: 0.9; }

        #player-ui { display: none; }
        .track-box { 
            background: rgba(255,255,255,0.06); margin: 12px 0; padding: 14px; 
            border-radius: 18px; cursor: pointer; display: flex; align-items: center; width: 100%; box-sizing: border-box;
            transition: 0.2s;
        }
        .track-box:hover { background: rgba(255,255,255,0.12); }
        .track-info { text-align: right; margin-right: 14px; flex-grow: 1; color: #fff; }
        .track-name { font-weight: bold; font-size: 1rem; display: block; }
        .artist { color: #bbb; font-size: 0.8rem; }

        canvas { width: 100%; height: 70px; margin-top: 15px; }
        audio { width: 100%; margin-top: 15px; filter: invert(1) hue-rotate(250deg); opacity: 0.6; }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="blob"></div>
        <div class="blob" style="animation-delay: -12s; right: 0; background: #311b92;"></div>
    </div>

    <div class="glass-card" id="lock-screen">
        <img src="logo.png" alt="GlobeOn" class="logo-img">
        <div>
            <h2>GLOBEON <span>LAB</span></h2>
            <input type="password" id="passwordInput" placeholder="Passcode">
            <button class="login-btn" onclick="checkPass()">ENTER</button>
        </div>
    </div>

    <div class="glass-card" id="player-ui">
        <div id="status-text" style="color: var(--primary); font-size: 0.8rem; margin-bottom: 10px;">Ready to Play</div>
        <div class="track-box" onclick="playMusic('andra.mp3', 'Rise Up', 'Andra Day')">
            <div style="font-size: 1.4rem;">🎵</div>
            <div class="track-info"><span class="track-name">Rise Up</span><span class="artist">Andra Day</span></div>
        </div>
        <div class="track-box" onclick="playMusic('kiana.mp3', 'Come And See Me', 'Kiana Ledé')">
            <div style="font-size: 1.4rem;">🎧</div>
            <div class="track-info"><span class="track-name">Come And See Me</span><span class="artist">Kiana Ledé</span></div>
        </div>
        <canvas id="canvas"></canvas>
        <audio id="main-player" controls></audio>
    </div>

    <script>
        let audioCtx, source, analyser, canvas, ctx, bufferLength, dataArray;

        function checkPass() {
            if(document.getElementById('passwordInput').value === "1234") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('player-ui').style.display = 'block';
                canvas = document.getElementById("canvas");
                ctx = canvas.getContext("2d");
            } else { alert("Wrong Code"); }
        }

        async function playMusic(file, title, artist) {
            const player = document.getElementById('main-player');
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(player);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                draw();
            }
            if (audioCtx.state === 'suspended') { await audioCtx.resume(); }
            player.src = file;
            player.play();
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title, artist: artist, artwork: [{ src: 'logo.png', sizes: '512x512', type: 'image/png' }]
                });
            }
        }

        function draw() {
            requestAnimationFrame(draw);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let x = 0;
            for(let i = 0; i < dataArray.length; i++) {
                let barHeight = dataArray[i] / 2;
                ctx.fillStyle = `rgba(187, 134, 252, 0.85)`;
                ctx.fillRect(x, canvas.height - barHeight, 3, barHeight);
                x += 6;
            }
        }
    </script>
</body>
</html>
